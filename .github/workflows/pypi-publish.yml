name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Validate tag input
        env:
          TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$TAG" ]]; then
            echo "tag input is required" >&2
            exit 1
          fi
          if [[ "$TAG" != v* ]]; then
            echo "tag must start with v" >&2
            exit 1
          fi

      - name: Checkout exact tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}
          fetch-depth: 0

      - name: Verify checked out tag
        env:
          TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          expected="$(git rev-parse "refs/tags/${TAG}^{commit}")"
          actual="$(git rev-parse HEAD)"
          if [[ "$actual" != "$expected" ]]; then
            echo "HEAD does not match peeled tag target" >&2
            echo "expected: $expected" >&2
            echo "actual:   $actual" >&2
            exit 1
          fi
          echo "verified tag ${TAG} -> ${actual}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish distributions to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-distributions
          path: dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
